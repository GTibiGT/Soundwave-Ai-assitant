<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUNDWAVE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>  
  /* ── DESIGN TOKENS ── */
    :root {
      --bg:        #050810;
      --bg2:       #0a0f1e;
      --panel:     #0d1428;
      --border:    #1a2a4a;
      --primary:   #7b2fff;
      --accent:    #7b2fff;
      --danger:    #ff3b6b;
      --text:      #c8deff;
      --muted:     #4a6080;
      --glow-c:    rgba(123,47,255,0.2);
      --glow-a:    rgba(123,47,255,0.2);
      --font-hud:  'Orbitron', monospace;
      --font-mono: 'Share Tech Mono', monospace;
    }
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
 
  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
 
  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 860px;
    padding: 32px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeDown 0.8s ease both;
  }
 
  .logo {
    font-family: var(--font-hud);
    font-weight: 900;
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 0.25em;
    color: var(--primary);
    text-shadow: 0 0 30px var(--primary), 0 0 60px rgba(0,212,255,0.3);
    text-transform: uppercase;
  }
 
  .subtitle {
    font-family: var(--font-hud);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }
 
  .status-bar {
    margin-top: 12px;
    display: flex;
    gap: 24px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
  }
 
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 6px var(--primary);
    animation: pulse-dot 2s ease-in-out infinite;
  }
 
  .status-dot.offline { background: var(--muted); box-shadow: none; animation: none; }
  .status-dot.active  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
 
  /* ── CASSETTE DISPLAY ── */
  .cassette-wrapper {
    margin: 32px 0 20px;
    animation: fadeDown 0.8s 0.15s ease both;
  }
 
  .cassette {
    width: 280px;
    height: 170px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    box-shadow: 0 0 40px var(--glow-c), inset 0 0 20px rgba(0,0,0,0.5);
    overflow: hidden;
  }
 
  .cassette::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
 
  .reel {
    width: 64px;
    height: 64px;
    border: 2px solid var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 12px var(--glow-c);
    position: relative;
  }
 
  .reel-inner {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--primary);
    border-radius: 50%;
    opacity: 0.5;
  }
 
  .reel-spokes {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
 
  .reel-spokes::before,
  .reel-spokes::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 100%; height: 1.5px;
    background: var(--primary);
    opacity: 0.3;
    transform-origin: left center;
    transform: translateY(-50%);
  }
 
  .reel-spokes::after { transform: translateY(-50%) rotate(60deg); }
 
  .reel.spinning .reel-spokes {
    animation: spin 1.5s linear infinite;
  }
  .reel.spinning {
    box-shadow: 0 0 20px var(--primary), 0 0 40px var(--glow-c);
  }
 
  /* ── WAVEFORM CANVAS ── */
  .waveform-wrap {
    position: absolute;
    bottom: 20px;
    left: 16px; right: 16px;
    height: 32px;
  }
 
  canvas#waveform {
    width: 100%;
    height: 100%;
  }
 
  /* ── MAIN LAYOUT ── */
  main {
    width: 100%;
    max-width: 860px;
    padding: 0 24px 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeUp 0.8s 0.3s ease both;
  }
 
  /* ── CHAT WINDOW ── */
  .chat-window {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 340px;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
 
  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.25s ease both;
  }
 
  .message-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
 
  .message.user .message-label { color: var(--accent); text-align: right; }
  .message.soundwave .message-label { color: var(--primary); }
 
  .message-bubble {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.65;
    max-width: 85%;
  }
 
  .message.user { align-items: flex-end; }
  .message.user .message-bubble {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.3);
    color: var(--text);
  }
 
  .message.soundwave .message-bubble {
    background: rgba(0,212,255,0.07);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--primary);
    font-family: var(--font-mono);
  }
 
  /* thinking dots */
  .thinking .message-bubble::after {
    content: '...';
    animation: blink 1s steps(3, end) infinite;
  }
 
  /* ── INPUT ROW ── */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
 
  .text-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    min-height: 48px;
    max-height: 140px;
  }
 
  .text-input::placeholder { color: var(--muted); }
  .text-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--glow-c);
  }
 
  /* ── BUTTONS ── */
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--font-hud);
    font-size: 10px;
    letter-spacing: 0.15em;
    padding:  16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 12px var(--glow-c); }
  .btn:active { transform: scale(0.97); }
 
  .btn.primary {
    background: rgba(0,212,255,0.1);
    border-color: var(--primary);
    color: var(--primary);
  }
 
  .btn.primary:hover { background: rgba(0,212,255,0.2); box-shadow: 0 0 20px var(--glow-c); }
 
  .btn.mic { border-color: var(--accent); color: var(--accent); }
  .btn.mic:hover { background: rgba(123,47,255,0.15); box-shadow: 0 0 12px var(--glow-a); }
  .btn.mic.recording {
    background: rgba(255,59,107,0.15);
    border-color: var(--danger);
    color: var(--danger);
    animation: pulse-border 1s ease-in-out infinite;
  }
 
  /* ── CONTROLS ROW ── */
  .controls-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
 
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-left: auto;
  }
 
  input[type="range"] {
    width: 80px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    outline: none;
  }
 
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 6px var(--primary);
    cursor: pointer;
  }
 
  /* ── SYSTEM PROMPT PANEL ── */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
 
  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-hud);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
 
  .panel-header:hover { color: var(--primary); }
 
  .panel-body {
    padding: 14px 16px;
    display: none;
  }
 
  .panel-body.open { display: block; }
 
  textarea.sys-prompt {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    padding: 10px;
    resize: vertical;
    min-height: 120px;
    outline: none;
  }
 
  textarea.sys-prompt:focus { border-color: var(--primary); }
 
  /* ── CONFIG ROW ── */
  .config-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
 
  .config-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 180px;
  }
 
  .config-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
 
  .config-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
 
  .config-input:focus { border-color: var(--primary); }
 
  /* ── ANIMATIONS ── */
  @keyframes spin        { to { transform: rotate(360deg); } }
  @keyframes pulse-dot   { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes pulse-border{ 0%,100%{box-shadow:0 0 0 2px rgba(255,59,107,0)} 50%{box-shadow:0 0 0 2px rgba(255,59,107,0.4)} }
  @keyframes blink       { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  @keyframes fadeDown    { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
  @keyframes fadeUp      { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  @keyframes msgIn       { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

</style>
</head>

        <button class="btn" id="btn-test-voice">TEST VOICE</button>
      </div>
    </div>
  </div>
 
</main>
